  <text x="674" y="74" fill="white" font-size="10" font-family="sans-serif">+ New Report</text>

  <!-- Tabs -->
  <rect x="12" y="98" width="90" height="28" rx="4 4 0 0" fill="#1A73E8"/>
  <text x="25" y="116" fill="white" font-size="10" font-family="sans-serif">My Reports</text>
  <rect x="108" y="98" width="110" height="28" rx="4 4 0 0" fill="#F8F9FA" stroke="#E8EAED"/>
  <text x="118" y="116" fill="#5F6368" font-size="10" font-family="sans-serif">Shared With Me</text>
  <rect x="224" y="98" width="80" height="28" rx="4 4 0 0" fill="#F8F9FA" stroke="#E8EAED"/>
  <text x="238" y="116" fill="#5F6368" font-size="10" font-family="sans-serif">Templates</text>

  <!-- Table -->
  <rect x="12" y="126" width="776" height="24" fill="#F8F9FA"/>
  <text x="20" y="142" fill="#202124" font-size="10" font-weight="600" font-family="sans-serif">Name</text>
  <text x="300" y="142" fill="#202124" font-size="10" font-weight="600" font-family="sans-serif">Fields</text>
  <text x="370" y="142" fill="#202124" font-size="10" font-weight="600" font-family="sans-serif">Created</text>
  <text x="480" y="142" fill="#202124" font-size="10" font-weight="600" font-family="sans-serif">Last Run</text>
  <text x="680" y="142" fill="#202124" font-size="10" font-weight="600" font-family="sans-serif" text-anchor="end">Actions</text>


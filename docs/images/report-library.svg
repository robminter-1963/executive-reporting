<svg width="800" height="320" xmlns="http://www.w3.org/2000/svg">
  <!-- Header -->
  <rect width="800" height="48" fill="#FFFFFF" stroke="#DADCE0"/>
  <rect x="12" y="10" width="28" height="28" rx="4" fill="#1A73E8"/>
  <text x="19" y="29" fill="white" font-size="12" font-weight="bold" font-family="sans-serif">T</text>
  <text x="48" y="30" fill="#202124" font-size="13" font-weight="600" font-family="sans-serif">TLE Reporting</text>
  <text x="155" y="30" fill="#9AA0A6" font-size="11" font-family="sans-serif">› Report Library</text>

  <!-- App bar -->
  <rect x="0" y="48" width="800" height="42" fill="#FFFFFF" stroke="#DADCE0"/>
  <text x="12" y="74" fill="#202124" font-size="14" font-weight="600" font-family="sans-serif">TLE Reporting Dashboard</text>

  <text x="470" y="72" fill="#5F6368" font-size="10" font-family="sans-serif">rob.minter</text>
  <text x="470" y="84" fill="#9AA0A6" font-size="8" font-family="sans-serif">rob@tle.com</text>

  <!-- Toolbar icons -->
  <rect x="560" y="58" width="24" height="24" rx="2" fill="none" stroke="#5F6368"/>
  <text x="565" y="75" fill="#5F6368" font-size="12" font-family="sans-serif">📊</text>
  <rect x="590" y="58" width="24" height="24" rx="2" fill="none" stroke="#5F6368"/>
  <text x="595" y="75" fill="#5F6368" font-size="12" font-family="sans-serif">⊞</text>
  <rect x="620" y="58" width="24" height="24" rx="2" fill="none" stroke="#5F6368"/>
  <text x="625" y="75" fill="#5F6368" font-size="12" font-family="sans-serif">⚙</text>

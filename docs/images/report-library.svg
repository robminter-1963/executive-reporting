  <text x="370" y="194" fill="#5F6368" font-size="10" font-family="sans-serif">Apr 12, 2026</text>
  <text x="480" y="194" fill="#5F6368" font-size="10" font-family="sans-serif">Apr 14, 2026 3:15 PM</text>
  <text x="630" y="194" fill="#1A73E8" font-size="11" font-family="sans-serif">▶</text>
  <text x="652" y="194" fill="#5F6368" font-size="11" font-family="sans-serif">✏</text>
  <text x="674" y="194" fill="#5F6368" font-size="11" font-family="sans-serif">⎘</text>
  <text x="696" y="194" fill="#5F6368" font-size="11" font-family="sans-serif">↗</text>
  <text x="718" y="194" fill="#5F6368" font-size="11" font-family="sans-serif">⏰</text>
  <text x="740" y="194" fill="#D93025" font-size="11" font-family="sans-serif">🗑</text>

  <!-- Row 3 -->
  <text x="20" y="218" fill="#202124" font-size="10" font-weight="500" font-family="sans-serif">Loans by Campaign</text>
  <text x="300" y="218" fill="#5F6368" font-size="10" font-family="sans-serif">10</text>
  <text x="370" y="218" fill="#5F6368" font-size="10" font-family="sans-serif">Apr 13, 2026</text>
  <text x="480" y="218" fill="#5F6368" font-size="10" font-family="sans-serif">Apr 14, 2026 2:00 PM</text>
  <text x="630" y="218" fill="#1A73E8" font-size="11" font-family="sans-serif">▶</text>
  <text x="652" y="218" fill="#5F6368" font-size="11" font-family="sans-serif">✏</text>
  <text x="674" y="218" fill="#5F6368" font-size="11" font-family="sans-serif">⎘</text>
  <text x="696" y="218" fill="#5F6368" font-size="11" font-family="sans-serif">↗</text>
  <text x="718" y="218" fill="#5F6368" font-size="11" font-family="sans-serif">⏰</text>
  <text x="740" y="218" fill="#D93025" font-size="11" font-family="sans-serif">🗑</text>

  <!-- Legend -->
  <rect x="12" y="250" width="776" height="60" rx="4" fill="#FFF8E1" stroke="#FFE082"/>
  <text x="22" y="270" fill="#E65100" font-size="10" font-weight="600" font-family="sans-serif">Toolbar Icons (left to right):</text>
  <text x="22" y="286" fill="#E65100" font-size="9" font-family="sans-serif">📊 Master Dashboard  |  ⊞ Grid Templates  |  ⚙ User Preferences  |  + New Report</text>
  <text x="22" y="302" fill="#E65100" font-size="9" font-family="sans-serif">Row Actions: ▶ Run  |  ✏ Edit  |  ⎘ Clone  |  ↗ Share  |  ⏰ Schedule  |  🗑 Delete</text>
</svg>

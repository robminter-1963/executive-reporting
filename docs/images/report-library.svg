  <text x="696" y="170" fill="#5F6368" font-size="11" font-family="sans-serif">↗</text>
  <text x="718" y="170" fill="#5F6368" font-size="11" font-family="sans-serif">⏰</text>
  <text x="740" y="170" fill="#D93025" font-size="11" font-family="sans-serif">🗑</text>


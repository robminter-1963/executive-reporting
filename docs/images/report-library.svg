  <text x="20" y="170" fill="#202124" font-size="10" font-weight="500" font-family="sans-serif">Pipeline by Status</text>
  <text x="300" y="170" fill="#5F6368" font-size="10" font-family="sans-serif">12</text>
  <text x="370" y="170" fill="#5F6368" font-size="10" font-family="sans-serif">Apr 10, 2026</text>
  <text x="480" y="170" fill="#5F6368" font-size="10" font-family="sans-serif">Apr 14, 2026 3:30 PM</text>
  <!-- Action buttons -->
  <text x="630" y="170" fill="#1A73E8" font-size="11" font-family="sans-serif">▶</text>
